events {
    worker_connections 1024;
}
http {
    port_in_redirect off;
    absolute_redirect off;
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream frontend { server frontend:3000; }
    upstream fastapi  { server fastapi:8001;  }
    upstream django   { server django:8002;   }
    upstream antifrod { server antifrod:8003; }

    server {
        listen 80;

        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/events {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/v1/events {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/bookings {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/v1/seats {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/v1/orders {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/auth {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/v1/auth {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /health {
            set $fastapi_upstream http://fastapi:8001;
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/antifrod {
            set $antifrod_upstream http://antifrod:8003;
            proxy_pass $antifrod_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/tickets {
            set $django_upstream http://django:8002;
            proxy_pass $django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /api/v1/tickets {
            set $django_upstream http://django:8002;
            proxy_pass $django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        location /admin {
            set $django_upstream http://django:8002;
            proxy_pass $django_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }
    }
}
