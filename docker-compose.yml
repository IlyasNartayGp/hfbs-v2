version: '3.9'

services:

  # ─── NGINX ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8880:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - fastapi
      - django
      - antifrod
    networks:
      - hfbs-network

  # ─── FRONTEND ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3737:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_PROXY_TARGET=http://nginx/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - hfbs-network

  # ─── FASTAPI ─────────────────────────────────────────────
  fastapi:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "9101:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://hfbs:hfbs_pass@postgres:5432/hfbs
      - REDIS_URL=redis://redis:6379
      - KAFKA_URL=kafka:9092
      - ANTIFROD_URL=http://antifrod:9303
      - DJANGO_TICKET_URL=http://django:8002/api/tickets/generate/
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend-fastapi:/app
      - tickets_data:/app/media/tickets
    networks:
      - hfbs-network

  # ─── DJANGO (только auth + admin) ────────────────────────
  django:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8002 --noreload"
    ports:
      - "9202:8002"
    environment:
      - DATABASE_URL=postgresql://hfbs:hfbs_pass@postgres:5432/hfbs
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend-django:/app
      - tickets_data:/app/media/tickets
    networks:
      - hfbs-network

  # ─── ANTIFROD ML сервис ───────────────────────────────────
  antifrod:
    build:
      context: ./antifrod
      dockerfile: Dockerfile
    ports:
      - "9303:8003"
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models/antifrod_model.pkl
    depends_on:
      - redis
    volumes:
      - ./antifrod:/app
      - antifrod_models:/app/models
    networks:
      - hfbs-network

  # ─── TICKET CONSUMER (PDF генерация) ─────────────────────
  ticket-consumer:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    command: python -m app.consumers.django_ticket_consumer
    environment:
      - DATABASE_URL=postgresql+asyncpg://hfbs:hfbs_pass@postgres:5432/hfbs
      - REDIS_URL=redis://redis:6379
      - KAFKA_URL=kafka:9092
      - DJANGO_TICKET_URL=http://django:8002/api/tickets/generate/
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - tickets_data:/app/media/tickets
    networks:
      - hfbs-network
    restart: unless-stopped

  # ─── ANTIFROD CONSUMER (ML проверка после брони) ─────────
  antifrod-consumer:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    command: python -m app.consumers.antifrod_consumer
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_URL=kafka:9092
      - ANTIFROD_URL=http://antifrod:9303
    depends_on:
      - kafka
      - antifrod
    networks:
      - hfbs-network
    restart: unless-stopped

  # ─── POSTGRESQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=hfbs
      - POSTGRES_USER=hfbs
      - POSTGRES_PASSWORD=hfbs_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "6543:5432"
    networks:
      - hfbs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hfbs"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── REDIS ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - hfbs-network

  # ─── KAFKA ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - hfbs-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - hfbs-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  tickets_data:
  antifrod_models:

networks:
  hfbs-network:
    driver: bridge
